<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proposta Comercial — Rita Cunha · Consultoria de Imagem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --vinho:#8c1f1f;--vinho-dk:#6a1616;--vinho-lt:#b84040;
      --creme:#faf6f2;--bege:#f0e8e0;--cinza:#5c5c5c;
      --escuro:#1f1f1f;--branco:#ffffff;
      --font-serif:'Cormorant Garamond',Georgia,serif;
      --font-sans:'Montserrat',Arial,sans-serif;
      --trans:.3s ease;
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font-sans);color:var(--escuro);background:var(--creme);line-height:1.65}
    .container{width:90%;max-width:1100px;margin:auto}

    /* TOPBAR */
    .topbar{background:var(--vinho);padding:16px 0;color:var(--branco);position:sticky;top:0;z-index:1000;transition:padding var(--trans),box-shadow var(--trans);box-shadow:0 2px 16px rgba(0,0,0,.12)}
    .topbar.scrolled{padding:10px 0;box-shadow:0 4px 24px rgba(0,0,0,.22)}
    .nav{display:flex;justify-content:space-between;align-items:center}
    .logo-text{font-family:var(--font-serif);font-size:26px;font-weight:300;letter-spacing:3px;color:var(--branco);text-transform:uppercase;text-decoration:none}
    .nav-right{display:flex;align-items:center;gap:32px}
    .menu{display:flex;gap:28px}
    .menu a{color:rgba(255,255,255,.88);text-decoration:none;font-weight:600;font-size:12px;letter-spacing:1.5px;transition:color var(--trans);position:relative;padding-bottom:2px}
    .menu a::after{content:'';position:absolute;left:0;bottom:-2px;width:0;height:1px;background:var(--branco);transition:width var(--trans)}
    .menu a:hover{color:var(--branco)}.menu a:hover::after{width:100%}
    .menuBtn{display:none;background:none;border:none;cursor:pointer;padding:4px}
    .menuBtn span{display:block;width:24px;height:2px;background:var(--branco);margin:6px 0;border-radius:2px;transition:transform var(--trans),opacity var(--trans)}
    .menuBtn.is-active span:nth-child(1){transform:translateY(8px) rotate(45deg)}
    .menuBtn.is-active span:nth-child(2){opacity:0}
    .menuBtn.is-active span:nth-child(3){transform:translateY(-8px) rotate(-45deg)}

    /* HERO */
    .hero-proposta{background:var(--escuro);padding:90px 0 80px;position:relative;overflow:hidden}
    .hero-proposta::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--vinho-dk) 0%,transparent 65%);opacity:.55}
    .hero-proposta-inner{position:relative;z-index:2;display:flex;align-items:flex-end;justify-content:space-between;gap:40px;flex-wrap:wrap}
    .hero-proposta-tag{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--vinho-lt);text-transform:uppercase;margin-bottom:18px}
    .hero-proposta h1{font-family:var(--font-serif);font-size:clamp(38px,6vw,72px);font-weight:300;line-height:1.08;color:var(--branco)}
    .hero-proposta h1 em{font-style:italic;color:rgba(255,180,180,.85)}

    /* MAGAZINE SECTION */
    .magazine-section{padding:70px 0 90px;background:var(--creme)}
    .mag-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:16px}
    .mag-header-left p{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--vinho);text-transform:uppercase;margin-bottom:8px}
    .mag-header-left h2{font-family:var(--font-serif);font-size:clamp(28px,4vw,42px);font-weight:300;letter-spacing:2px;color:var(--escuro)}
    .mag-counter{font-family:var(--font-serif);font-size:56px;font-weight:300;color:rgba(140,31,31,.12);line-height:1;display:flex;align-items:flex-end;gap:2px}
    .mag-counter span{font-size:18px;font-weight:300;color:var(--cinza);margin-bottom:8px;font-family:var(--font-sans)}

    /* ═══════════════════════════════════════════
       FLIPBOOK — layout e estrutura
    ═══════════════════════════════════════════ */
    .flipbook-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:24px;
    }

    .side-btn{
      flex-shrink:0;
      width:50px;height:50px;border-radius:50%;
      border:1.5px solid rgba(140,31,31,.25);
      background:var(--branco);color:var(--vinho);
      cursor:pointer;font-size:20px;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 18px rgba(0,0,0,.09);
      transition:all var(--trans);
    }
    .side-btn:hover:not(:disabled){
      background:var(--vinho);color:var(--branco);
      transform:scale(1.08);
      box-shadow:0 8px 26px rgba(140,31,31,.26);
    }
    .side-btn:active:not(:disabled){transform:scale(0.95)}
    .side-btn:disabled{opacity:.22;cursor:default;box-shadow:none}

    /* O "livro" — proporção A4 retrato */
    .book-wrap{
      flex:1;
      max-width:900px;
      position:relative;
    }

    /*
      .book-viewport: janela recortada, overflow:hidden
      Dentro dela ficam os slides num track que desliza
    */
    .book-viewport{
      width:100%;
      aspect-ratio:1/1.4142;
      position:relative;
      overflow:hidden;
      border-radius:3px;
      /* Sombra realista de livro — mais forte na direita (lombada) */
      box-shadow:
        0 2px 4px rgba(0,0,0,.10),
        0 10px 30px rgba(0,0,0,.16),
        0 28px 70px rgba(0,0,0,.22),
        6px 0 16px rgba(0,0,0,.14),
        -3px 0 8px rgba(0,0,0,.07);
      background:#111;
      /* Perspectiva para efeito 3D nos slides */
      perspective:900px;
    }

    /*
      Sombra de lombada no centro — linha sutil de profundidade
    */
    .book-viewport::before{
      content:'';position:absolute;
      top:0;bottom:0;left:0;width:6px;
      background:linear-gradient(to right,rgba(0,0,0,.18),transparent);
      z-index:50;pointer-events:none;
    }
    .book-viewport::after{
      content:'';position:absolute;
      top:0;bottom:0;right:0;width:4px;
      background:linear-gradient(to left,rgba(0,0,0,.10),transparent);
      z-index:50;pointer-events:none;
    }

    /*
      .Slidetrack: container de todos os slides lado a lado
      Cada slide tem width:100% do viewport
      A transição é feita com translateX
    */
    .Slidetrack{
      display:flex;
      height:100%;
      /* transition controlada via JS */
      will-change:transform;
    }

    .Slideitem{
      flex:0 0 100%;
      height:100%;
      position:relative;
      overflow:hidden;
    }

    .Slideitem img{
      width:100%;height:100%;
      object-fit:cover;display:block;
      user-select:none;-webkit-user-drag:none;pointer-events:none;
    }

    /*
      Overlay de sombra direcional que aparece durante a transição
      Simula a curvatura da página sendo virada
    */
    .Slideitem .page-shadow{
      position:absolute;inset:0;
      pointer-events:none;
      opacity:0;
      transition:opacity .1s;
      background:linear-gradient(to right,rgba(0,0,0,.22),transparent 40%,transparent 60%,rgba(0,0,0,.12));
    }
    .Slidetrack.sliding .Slideitem .page-shadow{
      opacity:1;
    }

    /* Badge e número */
    .Slidebadge{
      position:absolute;bottom:14px;left:14px;
      background:rgba(0,0,0,.52);backdrop-filter:blur(6px);
      color:rgba(255,255,255,.92);
      font-size:9px;font-weight:700;letter-spacing:2px;
      padding:5px 12px;border-radius:50px;text-transform:uppercase;
      pointer-events:none;z-index:100;
    }
    .Slidenum{
      position:absolute;bottom:14px;right:14px;
      font-size:10px;font-weight:500;color:rgba(255,255,255,.30);
      letter-spacing:1px;z-index:100;pointer-events:none;
    }

    /* PROGRESS + DOTS */
    .progress-wrap{
      width:100%;max-width:500px;
      margin:18px auto 0;
      height:2px;background:var(--bege);border-radius:1px;overflow:hidden;
    }
    .progress-fill{height:100%;background:var(--vinho);border-radius:1px;transition:width .4s ease}

    .mag-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:18px;flex-wrap:wrap}
    .dots-strip{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:340px}
    .dot{
      width:7px;height:7px;border-radius:50%;
      background:var(--bege);border:1px solid rgba(140,31,31,.18);
      cursor:pointer;transition:all .22s;padding:0;
    }
    .dot.active{background:var(--vinho);width:22px;border-radius:3px;border-color:var(--vinho)}

    /* THUMBNAILS */
    .thumbs-section{background:var(--escuro);padding:40px 0 50px}
    .thumbs-title{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:18px;text-align:center}
    .thumbs-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 5% 8px;scrollbar-width:thin;scrollbar-color:var(--vinho) #333;justify-content:center;flex-wrap:wrap}
    .thumbs-strip::-webkit-scrollbar{height:4px}
    .thumbs-strip::-webkit-scrollbar-track{background:#333}
    .thumbs-strip::-webkit-scrollbar-thumb{background:var(--vinho);border-radius:2px}
    .thumb{
      flex-shrink:0;width:60px;height:85px;
      border-radius:3px;overflow:hidden;
      border:2px solid transparent;cursor:pointer;
      transition:all .2s;opacity:.42;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .thumb:hover{opacity:.75;transform:translateY(-3px)}
    .thumb.active{border-color:var(--vinho);opacity:1}

    /* FOOTER */
    .footer{background:var(--escuro);color:var(--branco);padding:70px 0 0}
    .footerInner{display:flex;justify-content:space-between;align-items:flex-start;gap:40px;padding-bottom:60px}
    .footer-brand h3{font-family:var(--font-serif);font-size:36px;font-weight:300;letter-spacing:3px}
    .cargo{color:var(--vinho-lt);font-weight:700;font-size:11px;letter-spacing:3px;margin:8px 0 6px}
    .footer-ig{color:rgba(255,255,255,.45);font-size:14px}
    .footer-center{max-width:280px;text-align:center}
    .footer-quote em{font-family:var(--font-serif);font-size:20px;font-weight:300;font-style:italic;color:rgba(255,255,255,.5);line-height:1.6}
    .socials{display:flex;gap:12px;align-items:center}
    .social{width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);text-decoration:none;transition:transform var(--trans),background var(--trans)}
    .social:hover{transform:translateY(-5px);background:var(--vinho);border-color:transparent;color:var(--branco)}
    .footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding:20px 5%;text-align:center;font-size:12px;color:rgba(255,255,255,.28);letter-spacing:1px}

    /* RESPONSIVE */
    @media(max-width:640px){
      .flipbook-row{gap:10px}
      .side-btn{width:38px;height:38px;font-size:15px}
      .book-wrap{max-width:100%}
      .mag-counter{display:none}
    }
    @media(max-width:768px){
      .footerInner{flex-direction:column;align-items:center;text-align:center;gap:40px}
      .footer-center{max-width:100%}
      .menu{display:none;flex-direction:column;background:var(--vinho-dk);position:absolute;right:20px;top:60px;padding:20px 28px;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.3);gap:18px;min-width:180px}
      .menu.is-open{display:flex}
      .menu a{font-size:13px}
      .menuBtn{display:block}
      .topbar{position:relative}
    }
    @media(max-width:480px){.hero-proposta h1{font-size:34px}}
  </style>
</head>
<body>

<header class="topbar" id="topo">
  <div class="container nav">
    <a class="logo-text" href="index.html">Rita Cunha</a>
    <button id="menuBtn" class="menuBtn" aria-label="Abrir menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-right">
      <nav id="menu" class="menu" aria-label="Menu principal">
        <a href="https://www.instagram.com/rita.oliveiracunha/" target="_blank" rel="noopener">CONTATO</a>
      </nav>
    </div>
  </div>
</header>

<section class="hero-proposta">
  <div class="container hero-proposta-inner">
    <div>
      <p class="hero-proposta-tag">Consultoria de Imagem</p>
      <h1>Proposta<br><em>Comercial</em></h1>
    </div>
  </div>
</section>

<section class="magazine-section" id="proposta">
  <div class="container">
    <div class="mag-header">
      <div class="mag-header-left">
        <h2>Proposta Comercial</h2>
      </div>
      <div class="mag-counter">
        <strong id="magCur">01</strong>
        <span>&nbsp;/ 21</span>
      </div>
    </div>

    <div class="flipbook-row">
      <button class="side-btn" id="prevBtn" disabled aria-label="Slide anterior">&#8592;</button>

      <div class="book-wrap">
        <div class="book-viewport" id="bookViewport">

          <!-- Slide track — todos os slides em linha -->
          <div class="Slidetrack" id="slideTrack">
            <div class="Slideitem"><img src="assets/slide-1.JPG"  alt="Slide 01" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-2.JPG"  alt="Slide 02" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-3.JPG"  alt="Slide 03" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-4.JPG"  alt="Slide 04" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-5.JPG"  alt="Slide 05" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-6.JPG"  alt="Slide 06" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-7.JPG"  alt="Slide 07" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-8.JPG"  alt="Slide 08" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-9.JPG"  alt="Slide 09" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-10.JPG" alt="Slide 10" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-11.JPG" alt="Slide 11" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-12.JPG" alt="Slide 12" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-13.JPG" alt="Slide 13" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-14.JPG" alt="Slide 14" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-15.JPG" alt="Slide 15" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-16.JPG" alt="Slide 16" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-17.JPG" alt="Slide 17" draggable="false"><div class="page-shadow"></div></div>
            <div class="Slideitem"><img src="assets/slide-18.JPG" alt="Slide 18" draggable="false"><div class="page-shadow"></div></div>
          </div>

          <!-- Overlays fixos (ficam sobre o track, não deslizam) -->
          <span class="Slidebadge" id="stageBadge">01 · Capa</span>
          <span class="Slidenum"   id="stageNum">01 / 18</span>
        </div>
      </div>

      <button class="side-btn" id="nextBtn" aria-label="Próximo slide">&#8594;</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="mag-controls">
      <div class="dots-strip" id="dotsStrip"></div>
    </div>
  </div>
</section>

<section class="thumbs-section">
  <div class="thumbs-title">Todos os slides</div>
  <div class="thumbs-strip" id="thumbsStrip"></div>
</section>

<footer id="contato" class="footer">
  <div class="container footerInner">
    <div class="footer-brand">
      <h3>Rita Cunha</h3>
      <p class="cargo">CONSULTORA DE IMAGEM</p>
      <p class="footer-ig">@rita.oliveiracunha</p>
    </div>
    <div class="footer-center">
      <p class="footer-quote"><em>"Imagem é identidade,<br>posicionamento e segurança."</em></p>
    </div>
    <div class="socials">
      <a class="social" href="https://www.instagram.com/rita.oliveiracunha/" target="_blank" rel="noopener" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>
    </div>
  </div>
  <div class="footer-bottom"><p>© 2025 Rita Cunha · Consultoria de Imagem</p></div>
</footer>

<script>
const SLIDES = [
  {src:'assets/slide-1.JPG',  badge:'01 · Capa'},
  {src:'assets/slide-2.JPG',  badge:'02 · Catálogo'},
  {src:'assets/slide-3.JPG',  badge:'03 · Catálogo'},
  {src:'assets/slide-4.JPG',  badge:'04 · Catálogo'},
  {src:'assets/slide-5.JPG',  badge:'05 · Consultoria'},
  {src:'assets/slide-6.JPG',  badge:'06 · Serviço'},
  {src:'assets/slide-7.JPG',  badge:'07 · Diagnóstico'},
  {src:'assets/slide-8.JPG',  badge:'08 · Guarda Roupa'},
  {src:'assets/slide-9.JPG',  badge:'09 · Mala'},
  {src:'assets/slide-10.JPG', badge:'10 · Compras'},
  {src:'assets/slide-11.JPG', badge:'11 · Looks'},
  {src:'assets/slide-12.JPG', badge:'12 · Coloração'},
  {src:'assets/slide-13.JPG', badge:'13 · Cuidados'},
  {src:'assets/slide-14.JPG', badge:'14 · Apoio'},
  {src:'assets/slide-15.JPG', badge:'15 · Benefícios'},
  {src:'assets/slide-16.JPG', badge:'16 · Benefícios'},
  {src:'assets/slide-17.JPG', badge:'17 · Investimento'},
  {src:'assets/slide-18.JPG', badge:'18 · Pagamento'},
];

/* ─── Configuração da animação ───────────────────────────────
   Efeito: slide horizontal com aceleração/desaceleração suave
   + leve escala no slide que entra (parece "emergir" da página)
   + sombra direcional durante o movimento
─────────────────────────────────────────────────────────────── */
const DURATION  = 520;  // ms — tempo de transição
const EASING    = 'cubic-bezier(0.32, 0, 0.18, 1)'; // ease-in-out agressivo

let current   = 0;
let busy      = false;
let touchX0   = 0;
let touchY0   = 0;
let dragX     = 0;
let isDragging= false;

const track        = document.getElementById('slideTrack');
const viewport     = document.getElementById('bookViewport');
const stageBadge   = document.getElementById('stageBadge');
const stageNum     = document.getElementById('stageNum');
const magCur       = document.getElementById('magCur');
const prevBtn      = document.getElementById('prevBtn');
const nextBtn      = document.getElementById('nextBtn');
const dotsStrip    = document.getElementById('dotsStrip');
const thumbsStrip  = document.getElementById('thumbsStrip');
const progressFill = document.getElementById('progressFill');

/* Posiciona o track sem animação */
function setPosition(idx, animate) {
  if (animate) {
    track.style.transition = `transform ${DURATION}ms ${EASING}`;
  } else {
    track.style.transition = 'none';
  }
  track.style.transform = `translateX(${-idx * 100}%)`;
}

/* Inicializar — posicionar no primeiro slide sem animação */
setPosition(0, false);

/* Dots */
SLIDES.forEach((_,i) => {
  const d = document.createElement('button');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.setAttribute('aria-label', 'Slide ' + (i+1));
  d.addEventListener('click', () => goTo(i));
  dotsStrip.appendChild(d);
});

/* Thumbnails */
SLIDES.forEach((s,i) => {
  const t = document.createElement('div');
  t.className = 'thumb' + (i === 0 ? ' active' : '');
  t.innerHTML = `<img src="${s.src}" alt="${s.badge}" loading="lazy">`;
  t.addEventListener('click', () => goTo(i));
  thumbsStrip.appendChild(t);
});

function updateUI() {
  const n = current + 1;
  stageBadge.textContent  = SLIDES[current].badge;
  stageNum.textContent    = String(n).padStart(2,'0') + ' / ' + SLIDES.length;
  magCur.textContent      = String(n).padStart(2,'0');
  prevBtn.disabled        = current === 0;
  nextBtn.disabled        = current === SLIDES.length - 1;
  progressFill.style.width = (current / (SLIDES.length - 1) * 100) + '%';
  document.querySelectorAll('.dot').forEach((d,i)  => d.classList.toggle('active', i === current));
  document.querySelectorAll('.thumb').forEach((t,i) => t.classList.toggle('active', i === current));
  /* Scroll horizontal apenas dentro do strip de thumbnails */
  const th = thumbsStrip.children[current];
  if (th) {
    const stripLeft = thumbsStrip.scrollLeft;
    const stripWidth = thumbsStrip.offsetWidth;
    const thLeft = th.offsetLeft;
    const thWidth = th.offsetWidth;
    const target = thLeft - (stripWidth / 2) + (thWidth / 2);
    thumbsStrip.scrollTo({left: target, behavior: 'smooth'});
  }
}

function goTo(idx) {
  if (busy || idx === current || idx < 0 || idx >= SLIDES.length) return;
  busy = true;

  track.classList.add('sliding');
  setPosition(idx, true);
  current = idx;
  updateUI();

  setTimeout(() => {
    track.classList.remove('sliding');
    busy = false;
  }, DURATION + 30);
}

/* Botões */
prevBtn.addEventListener('click', () => goTo(current - 1));
nextBtn.addEventListener('click', () => goTo(current + 1));

/* ─── Touch / swipe com feedback visual em tempo real ────────
   O utilizador pode ver o slide deslizando enquanto arrasta,
   e ao soltar ele snapa para o slide correto.
─────────────────────────────────────────────────────────────── */
viewport.addEventListener('touchstart', e => {
  if (busy) return;
  touchX0   = e.touches[0].clientX;
  touchY0   = e.touches[0].clientY;
  dragX     = 0;
  isDragging= false;
  /* Remover transição durante o drag */
  track.style.transition = 'none';
}, {passive: true});

viewport.addEventListener('touchmove', e => {
  if (busy) return;
  const dx = e.touches[0].clientX - touchX0;
  const dy = e.touches[0].clientY - touchY0;

  /* Só tratar como drag horizontal se for mais horizontal que vertical */
  if (!isDragging && Math.abs(dx) < Math.abs(dy)) return;
  isDragging = true;

  dragX = dx;

  /* Resistência nas bordas (primeiro/último slide) */
  let resistance = 1;
  if ((current === 0 && dx > 0) || (current === SLIDES.length - 1 && dx < 0)) {
    resistance = 0.18;
  }

  /* Mover o track em tempo real */
  const base   = -current * 100;            /* % do slide atual */
  const offset = (dragX * resistance / viewport.offsetWidth) * 100;
  track.style.transform = `translateX(calc(${base}% + ${dragX * resistance}px))`;
}, {passive: true});

viewport.addEventListener('touchend', e => {
  if (!isDragging) return;
  isDragging = false;

  const threshold = viewport.offsetWidth * 0.22; /* 22% da largura para trocar */

  if (dragX < -threshold && current < SLIDES.length - 1) {
    goTo(current + 1);
  } else if (dragX > threshold && current > 0) {
    goTo(current - 1);
  } else {
    /* Snap de volta para o slide atual */
    track.style.transition = `transform ${DURATION * 0.6}ms ${EASING}`;
    track.style.transform  = `translateX(${-current * 100}%)`;
    setTimeout(() => { busy = false; }, DURATION * 0.6);
  }
}, {passive: true});

/* Teclado */
document.addEventListener('keydown', e => {
  if      (e.key === 'ArrowRight') goTo(current + 1);
  else if (e.key === 'ArrowLeft')  goTo(current - 1);
});

/* Navbar */
window.addEventListener('scroll', () => {
  document.getElementById('topo').classList.toggle('scrolled', window.scrollY > 40);
}, {passive: true});

/* Hamburger */
document.getElementById('menuBtn').addEventListener('click', function() {
  this.classList.toggle('is-active');
  document.getElementById('menu').classList.toggle('is-open');
  this.setAttribute('aria-expanded', this.classList.contains('is-active'));
});

updateUI();
</script>
</body>
</html>
